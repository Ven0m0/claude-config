[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.0" # Ruff version.
hooks = [
  # Run the linter.
  { id = "ruff-check", args = ["--fix"], types_or = ["python", "pyi"] },

  # Run the formatter.
  { id = "ruff-format", types_or = ["python", "pyi"] },
]

[[repos]]
repo = "https://github.com/avifenesh/agnix"
rev = "v0.17.0"
hooks = [
  { id = "agnix" },
  { id = "agnix-fix" },
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "biome-check",
    name = "biome check",
    entry = "bunx @biomejs/biome check --write",
    language = "node",
    types_or = ["javascript", "typescript", "jsx", "tsx", "json", "jsonc"],
    pass_filenames = true,
  },
  {
    id = "oxlint",
    name = "oxlint",
    entry = "bunx oxlint --fix",
    language = "node",
    types_or = ["javascript", "typescript", "jsx", "tsx"],
    pass_filenames = true,
  },
  {
    id = "oxfmt",
    name = "oxfmt",
    entry = "bunx oxfmt",
    language = "node",
    types_or = ["javascript", "typescript", "jsx", "tsx"],
    pass_filenames = true,
  },
]
