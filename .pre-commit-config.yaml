# https://github.com/j178/prek
repos:
  - repo: local
    hooks:
      - id: uv-lock-upgrade
        name: Run uv lock --upgrade
        entry: uv lock --upgrade
        language: python
        pass_filenames: false
      - id: pre-commit autoupdate
        name: autoupdate pre-commit
        entry: pre-commit autoupdate
        language: system
        pass_filenames: false
      - id: biome-check
        name: biome check
        entry: bunx @biomejs/biome check --write
        language: node
        types_or: [javascript, typescript, jsx, tsx, json, jsonc]
        pass_filenames: true
      - id: oxlint
        name: oxlint
        entry: bunx oxlint --fix
        language: node
        types_or: [javascript, typescript, jsx, tsx]
        pass_filenames: true
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-toml
      - id: fix-byte-order-marker
      - id: mixed-line-ending
  - repo: https://github.com/DetachHead/basedpyright-prek-mirror
    rev: 1.39.3
    hooks:
      - id: basedpyright
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
  - repo: https://github.com/avifenesh/agnix
    rev: v0.24.0
    hooks:
      - id: agnix
      - id: agnix-fix
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.2
    hooks:
      - id: check-dependabot
      - id: check-github-actions
      - id: check-github-workflows
  - repo: https://github.com/mangiucugna/gha-updater-pre-commit
    rev: v0.1
    hooks:
      - id: gha-update
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: v0.1.87
    hooks:
      - id: rumdl
      - id: rumdl-fmt
