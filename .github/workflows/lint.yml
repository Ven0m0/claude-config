name: Lint

on:
  workflow_dispatch:

jobs:
  ruff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate agent configs
        uses: agent-sh/agnix@v0.18.0
        with:
          target: 'claude-code'
