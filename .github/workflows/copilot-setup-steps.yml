name: Copilot Setup Steps
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
permissions:
  contents: read
env:
  DEBIAN_FRONTEND: noninteractive 
  DEBCONF_NOWARNINGS: yes
jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - uses: oven-sh/setup-bun@v2
      - name: Install apt packages
        run: |
          sudo apt-get update -qq >/dev/null 2>&1
          sudo apt-get install -yqq --no-install-recommends ripgrep fd-find shellcheck shfmt build-essential pkg-config
      - name: Install repository toolchain
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true
      - name: Install project Python dependencies
        run: uv sync --all-extras --all-packages --all-groups --frozen && source .venv/bin/activate
      - name: Preinstall uv tools
        run: |
          uv tool install basedpyright
          uv tool install ty
          uv tool install ruff
          uv tool install tombi
      - name: Install project JS/TS dependencies
        run: bun install --frozen-lockfile
      - name: Preinstall bun global packages
        run: |
          bun i -g @zed-industries/vscode-langservers-extracted yaml-language-server bash-language-server @ast-grep/cli @biomejs/biome oxlint oxfmt typescript @vtsls/language-server
