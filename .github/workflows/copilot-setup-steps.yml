name: Copilot Setup Steps
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
permissions:
  contents: read
env:
  DEBIAN_FRONTEND: noninteractive
  DEBCONF_NOWARNINGS: yes
jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - uses: oven-sh/setup-bun@v2

      - name: Install system packages
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: shellcheck jq build-essential pkg-config ripgrep fd-find
          version: 1.0
      - name: Install shfmt
        shell: bash
        run: |
          SHFMT_VERSION="3.10.0"
          wget -q "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64" -O shfmt
          chmod +x shfmt
          sudo mv shfmt /usr/local/bin/
      - name: Install repository toolchain
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true
      - name: Install project Python dependencies
        run: uv sync --all-extras --all-packages --all-groups --frozen

      - name: Install project JS/TS dependencies
        run: bun install --frozen-lockfile
      - name: Preinstall bun global packages
        run: |
          bun i -g @zed-industries/vscode-langservers-extracted yaml-language-server bash-language-server @ast-grep/cli @biomejs/biome oxlint oxfmt typescript @vtsls/language-server
