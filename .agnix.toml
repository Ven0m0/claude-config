severity = "Warning"  # Warning, Error, Info

tools = ["claude-code", "cursor", "github-copilot", "codex", "generic", "copilot"]

exclude = [
  "node_modules/**",
  ".git/**",
  "target/**",
  # claude-code-lsps uses versioned subdirectory structure (plugin-name/version/)
  # rather than the standard .claude-plugin/ layout - exclude from plugin validation
  "plugins/claude-code-lsps/**",
  # shared-patterns is a stub module directory, not an agent config
  "shared-patterns/**",
  # copilot-cli uses GitHub Copilot CLI MCP format with 'local' type (not stdio/http/sse)
  "copilot-cli/**",
]

[rules]
# Category toggles - all default to true
skills = true              # AS-*, CC-SK-* rules
hooks = true               # CC-HK-* rules
agents = true              # CC-AG-* rules
copilot = true             # COP-* rules
cursor = true              # CUR-* rules
memory = true              # CC-MEM-* rules
plugins = true             # CC-PL-* rules
mcp = true                 # MCP-* rules
prompt_engineering = true  # PE-* rules
xml = true                 # XML-* rules
imports = true             # REF-* rules
cross_platform = true      # XP-* rules
agents_md = true           # AGM-* rules

# Disable specific rules by ID
disabled_rules = [
  # CDX-AG-002: False positive - "token" in docs refers to LLM tokens, not auth tokens
  "CDX-AG-002",
  # AS-014: False positive - escaped backticks (\`\`\`) in markdown and bash variable
  # quoting ("$FILE") are detected as Windows path separators; these are valid posix content
  "AS-014",
]

# Version-aware validation (optional)
[tool_versions]
# claude_code = "1.0.0"
# cursor = "0.45.0"

[spec_revisions]
# mcp_protocol = "2025-11-25"

# File inclusion/exclusion for non-standard agent files
[files]
# Validate as CLAUDE.md-like memory/instruction files
# include_as_memory = ["docs/ai-rules/*.md", "custom/INSTRUCTIONS.md"]

# Validate as generic markdown (XML, imports, cross-platform rules)
# include_as_generic = ["internal/*.md"]

# Exclude from validation entirely (even built-in file types)
# opencode/ uses OpenCode-specific agent format (tools as permission map, not list)
# and uses @file references as lazy-loading instructions, not Claude Code @import syntax
exclude = ["opencode/**"]
