# .markdownlint.yaml - Markdown linting rules

default: true

# Line length - code examples often exceed 80 chars
MD013: false

# Allow heading level skips (common in docs)
MD001: false

# Allow headings without blank lines (for denser documentation)
MD022: false

# Duplicate headings - allow for long pages
MD024: false

# Multiple top-level headings - acceptable in long docs
MD025: false

# Allow trailing punctuation in headings
MD026: false

# Ordered list item prefix - allow flexible numbering
MD029: false

# Don't require blank lines around fenced code blocks
MD031: false

# Allow lists without blank lines around them (common in docs)
MD032: false

# Allow inline HTML where needed for documentation
MD033:
  allowed_elements: ['br', 'img', 'a', 'ul', 'li', 'ol', 'p', 'div', 'span', 'skill']

# Allow bare URLs in documentation
MD034: false

# Horizontal rule style - allow any style
MD035: false

# Emphasis as heading - allow for examples/notes
MD036: false

# Allow code fences without language specification
MD040: false

# First line heading - not required for all files
MD041: false

# Code block style - allow both fenced and indented
MD046: false

# Don't require single trailing newline
MD047: false

# Allow both asterisk and underscore emphasis
MD049: false
